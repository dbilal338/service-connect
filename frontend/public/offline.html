<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>آف لائن - Service Connect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 360px;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 16px; opacity: 0.85; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: white;
      color: #1d4ed8;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }
    .sub { font-size: 13px; opacity: 0.7; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>آپ آف لائن ہیں</h1>
    <p>انٹرنیٹ کنیکشن نہیں ہے۔<br/>براہ کرم اپنا نیٹ ورک چیک کریں۔</p>
    <button class="btn" onclick="location.reload()">دوبارہ کوشش کریں</button>
    <p class="sub">Service Connect — پاکستان کا مقامی خدمات پلیٹ فارم</p>
  </div>
</body>
</html>
